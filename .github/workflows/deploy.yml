name: Deploy to AWS EC2

on:
  push:
    branches:
      - master # Agar teri main branch ka naam 'master' hai, toh yahan master kar dena

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # 1. Apne project folder ke andar jao (EC2 path updated to repo name)
            cd /home/ubuntu/SangeetX 

            # 2. Latest code pull karo
            git pull origin master

            # 3. Dependencies install karo (agar backend/frontend hai toh)
            npm install

            # 4. App ko restart karo (using main.js as entry point)
            pm2 restart all || pm2 start main.js --name "sangeetx"
